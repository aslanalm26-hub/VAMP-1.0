<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login — VAMP</title><link rel="stylesheet" href="style.css"><script src="app.js"></script></head><body><script>nav()</script><div class="wrap"><section><div class="head"><h2>Login</h2><span class="muted">Demo login works with local storage.</span></div><div class="panel" style="max-width:560px"><label>Name</label><input id="name" placeholder="Aslan Canoğlu"><label>Email</label><input id="email" placeholder="pilot@vamp.aero"><label>Role</label><select id="role"><option value="pilot">Pilot</option><option value="admin">Admin</option></select><br><br><button class="btn primary" onclick="VAMP.login(document.getElementById('email').value||'pilot@vamp.aero',document.getElementById('name').value||'Demo Pilot',document.getElementById('role').value)">Login</button><p class="muted">Tip: choose Admin to access approval tools.</p></div></section></div></body></html>
