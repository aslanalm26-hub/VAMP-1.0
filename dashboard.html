<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard — VAMP</title><link rel="stylesheet" href="style.css"><script src="app.js"></script></head><body><script>nav()</script><div class="wrap"><section><div class="head"><h2>Pilot Dashboard</h2><span class="muted">Demo user and bookings.</span></div><div class="grid"><div class="card"><h3 id="pname">Demo Pilot</h3><p class="muted" id="pmeta">Cadet Pilot · PV0002</p><div id="ep"></div></div><div class="card"><h3>Total Hours</h3><p style="font-size:34px;margin:0;font-weight:900">0.0</p><p class="muted">ACARS integration later.</p></div><div class="card"><h3>Status</h3><p><span class="status approved">Active</span></p></div></div></section><section><div class="head"><h2>My Bookings</h2><a class="btn primary" href="dispatch.html">Book Flight</a></div><div class="tablebox"><table id="bookTable"></table></div></section></div><script>
const u=VAMP.user()||{name:'Guest Pilot',pilotId:'PV0002',rank:'Cadet Pilot'}; pname.textContent=u.name; pmeta.textContent=u.rank+' · '+u.pilotId; document.getElementById('ep').innerHTML=ep(u.rank==='Captain'?4:1);
const b=VAMP.bookings(); bookTable.innerHTML='<tr><th>Flight</th><th>Route</th><th>Aircraft</th><th>Status</th></tr>'+(b.length?b.map(x=>`<tr><td>${x.flight}</td><td>${x.route}</td><td>${x.aircraft}</td><td>${x.status}</td></tr>`).join(''):'<tr><td colspan=4>No bookings yet.</td></tr>');
</script></body></html>
