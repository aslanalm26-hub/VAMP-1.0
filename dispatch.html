<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dispatch — VAMP</title><link rel="stylesheet" href="style.css"><script src="app.js"></script></head><body><script>nav()</script><div class="wrap"><section><div class="head"><h2>Dispatch Center</h2><span class="muted">Book demo flights. SimBrief button copies data.</span></div><div class="tablebox"><table id="flights"></table></div></section></div><script>
const flights=[{flight:'PV2211',callsign:'PVX2211',route:'LTFM-LTAI',aircraft:'A321neo',level:'FL350'},{flight:'PV1173',callsign:'PVX1173',route:'LTFJ-EDDF',aircraft:'A320neo',level:'FL360'},{flight:'PV7151',callsign:'PVX7151',route:'LTFM-EGKK',aircraft:'A321neo',level:'FL340'},{flight:'PV3301',callsign:'PVX3301',route:'LTAC-LTFJ',aircraft:'B738',level:'FL300'}];
flightsEl=document.getElementById('flights'); flightsEl.innerHTML='<tr><th>Flight</th><th>Callsign</th><th>Route</th><th>Aircraft</th><th>Cruise</th><th>Action</th></tr>'+flights.map(f=>`<tr><td>${f.flight}</td><td>${f.callsign}</td><td>${f.route}</td><td>${f.aircraft}</td><td>${f.level}</td><td><button class="btn primary" onclick='VAMP.book(${JSON.stringify(f)})'>Book</button> <button class="btn" onclick="navigator.clipboard.writeText('${f.callsign} ${f.route} ${f.aircraft} ${f.level}');alert('SimBrief data copied')">SimBrief</button></td></tr>`).join('');
</script></body></html>
