<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin — VAMP</title><link rel="stylesheet" href="style.css"><script src="app.js"></script></head><body><script>nav()</script><div class="wrap"><section><div class="head"><h2>Admin Panel</h2><span class="muted">Pilot applications are working locally.</span></div><div class="panel"><div class="actions"><a class="btn primary" href="login.html">Login as Admin</a><button class="btn danger" onclick="localStorage.removeItem('vamp_apps');location.reload()">Clear Applications</button></div><br><div class="tablebox"><table id="appsTable"></table></div></div></section></div><script>
const apps=VAMP.apps(); const t=document.getElementById('appsTable');
t.innerHTML='<tr><th>Name</th><th>Email</th><th>VATSIM</th><th>Airline</th><th>Status</th><th>Action</th></tr>'+ (apps.length?apps.map(a=>`<tr><td>${a.first} ${a.last}</td><td>${a.email}</td><td>${a.cid}</td><td>${a.airline}</td><td><span class="status ${a.status}">${a.status}</span></td><td><button class="btn" onclick="VAMP.updateApp(${a.id},'approved');location.reload()">Approve</button> <button class="btn danger" onclick="VAMP.updateApp(${a.id},'rejected');location.reload()">Reject</button></td></tr>`).join(''):'<tr><td colspan="6">No applications yet. Submit one from Apply page.</td></tr>');
</script></body></html>
